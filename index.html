<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERCORE | Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #991b1b; --bg: #030303; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Ефект зернистості (як на FunTime) */
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png');
            opacity: 0.02; pointer-events: none; z-index: 9999;
        }

        /* Стиль вибору режиму */
        .mode-row {
            width: 100%; height: 180px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 8%; background: #070707;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative; margin-bottom: 12px;
        }
        .mode-row:hover { border-color: var(--accent); background: #0a0000; transform: translateX(10px); }
        .mode-row::after { content: 'ENTER'; position: absolute; right: 5%; font-family: 'Orbitron'; font-size: 10px; opacity: 0; transition: 0.3s; color: var(--accent); letter-spacing: 5px; }
        .mode-row:hover::after { opacity: 1; right: 8%; }
        
        .tab-content { display: none; min-height: 100vh; flex-direction: column; }
        .tab-content.active { display: flex; animation: fadeIn 0.5s ease; }
        .sub-content { display: none; }
        .sub-content.active { display: block; animation: slideIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: rgba(255,255,255,0.01); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .glass-card:hover { border-color: var(--accent); background: rgba(153, 27, 27, 0.03); }

        .sticky-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; width: 95%; max-width: 600px;
        }
        .float-btn {
            flex: 1; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 2px; font-size: 9px; font-weight: 900;
            letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; text-align: center;
        }
        .float-btn:hover { border-color: var(--accent); background: var(--accent); color: white; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div class="grain"></div>

    <!-- 1. ЕКРАН ВИБОРУ (ГОЛОВНА) -->
    <div id="selection" class="tab-content active p-6 md:p-20 flex flex-col justify-center">
        <div class="mb-12">
            <h1 class="orbitron text-5xl md:text-8xl font-black italic tracking-tighter">OVER<span class="text-red-800">CORE</span></h1>
            <p class="text-zinc-600 text-[10px] tracking-[1em] uppercase mt-2 font-bold italic">Network Dominion</p>
        </div><div onclick="openMode('ANARX')" class="mode-row group">
            <div>
                <h2 class="orbitron text-4xl md:text-5xl font-black italic uppercase group-hover:text-red-700 transition">AnarX</h2>
                <p class="text-zinc-600 text-[9px] uppercase tracking-[0.4em] mt-1 italic">💀 NO RULES • CHAOS • DOMINANCE</p>
            </div>
            <div class="orbitron text-6xl font-black opacity-[0.03]">01</div>
        </div>

        <div onclick="openMode('NEXOSMP')" class="mode-row group">
            <div>
                <h2 class="orbitron text-4xl md:text-5xl font-black italic uppercase text-red-800 group-hover:text-white transition">Nexo SMP</h2>
                <p class="text-zinc-600 text-[9px] uppercase tracking-[0.4em] mt-1 italic">🎭 ROLEPLAY • VOICE • COMMUNITY</p>
            </div>
            <div class="orbitron text-6xl font-black opacity-[0.03]">02</div>
        </div>
    </div>

    <!-- 2. ВНУТРІШНІЙ ІНТЕРФЕЙС (ПІСЛЯ ВИБОРУ) -->
    <div id="main-ui" class="tab-content">
        <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/95 z-[100]">
            <!-- Логотип повертає на головну -->
            <div class="orbitron text-xl font-black italic cursor-pointer group" onclick="goBack()">
                OVER<span class="text-red-800 group-hover:text-white transition">CORE</span>
            </div>
            <div class="flex gap-6">
                <span class="cursor-pointer text-[10px] font-black uppercase tracking-widest hover:text-red-800 transition" onclick="switchSub('home')">Інфо</span>
                <span class="cursor-pointer text-[10px] font-black uppercase tracking-widest hover:text-red-800 transition" onclick="switchSub('rules')">Правила</span>
                <span class="cursor-pointer text-[10px] font-black uppercase tracking-widest hover:text-red-800 transition" onclick="switchSub('donate')">Донат</span>
            </div>
        </nav>

        <!-- Суб-сторінки -->
        <div id="sub-home" class="sub-content active py-32 text-center px-4">
            <h2 id="current-mode-title" class="orbitron text-6xl md:text-[9rem] font-black italic uppercase leading-none">SERVER</h2>
            <p id="mode-desc" class="text-red-800 orbitron tracking-[1em] text-[10px] mt-8 opacity-50 uppercase font-bold italic">System Online</p>
        </div>

        <div id="sub-rules" class="sub-content py-20 px-6 max-w-4xl mx-auto">
            <h2 class="orbitron text-3xl font-black italic uppercase mb-12 border-l-4 border-red-800 pl-4">Кодекс_</h2>
            <div id="rules-container" class="grid gap-6"></div>
        </div>

        <div id="sub-donate" class="sub-content py-20 px-6 max-w-7xl mx-auto">
            <h2 class="orbitron text-3xl font-black italic uppercase mb-16 text-center">Пільги та Ранги</h2>
            <div id="donate-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <!-- 3. ПАНЕЛЬ IP ТА DISCORD -->
    <div class="sticky-bar">
        <button onclick="copyIP()" class="float-btn orbitron group">
            <span id="ip-text" class="text-red-800 tracking-widest">CLICK TO COPY IP</span>
        </button>
        <a href="https://discord.gg/9EBazmNJzY" target="_blank" class="float-btn orbitron bg-red-800 border-red-800 text-white hover:bg-white hover:text-black">
            Discord
        </a>
    </div><script>
        const data = {
            'ANARX': {
                ip: 'overcore.myftp.org',
                desc: 'Повна анархія. Виживає найсильніший.',
                rules: [
                    { category: '💀 ГРИФ ТА PvP', list: ['Ламати бази та красти ресурси — дозволено.', 'Засідки та пастки — частина гри.', 'PvP без обмежень.'] },
                    { category: '🚫 СУВОРО ЗАБОРОНЕНО', list: ['Чіти, хаки, X-Ray.', 'Дюпи (баги на предмети).', 'Атаки на сервер (DoS/DDoS).', 'Продаж за реальні гроші повз адміністрацію.'] },
                    { category: '⚙️ ВАЖЛИВО', list: ['Креатив видається ТИМЧАСОВО.', 'Зловживання креативом = зняття.', 'Донат не повертається.', 'Рішення адміна — остаточне.'] }
                ],
                donate: [
                    { name: 'VIP', price: '29 UAH', features: ['Політ (/fly)', '2 точки дому', 'Аура частинок', 'VIP кейси'] },
                    { name: 'PRO', price: '79 UAH', features: ['Політ без обмежень', 'Ремонт (/repair)', '5 точок дому', 'Покращені кейси'] },
                    { name: 'GOD', price: '149 UAH', features: ['Режим бога (/god)', 'Ремонт без КД', '10 точок дому', 'Золота аура'] },
                    { name: 'CREATIVE', price: '19-99 UAH', features: ['Creative Mode', 'Нищення баз', '15хв / 1год / 1день'] }
                ]
            },
            'NEXOSMP': {
                ip: 'nexosmp.myftp.org',
                desc: 'Приватне ком’юніті та ванільне виживання.',
                rules: [
                    { category: '📜 ОСНОВНІ ПРАВИЛА', list: ['Поважай кожного гравця.', 'Гриферство = БАН.', 'Не кради ресурсів.', 'PvP тільки за згодою.', 'Чити = PERMANENT BAN.'] },
                    { category: '⚙️ ІГРОВИЙ СВІТ', list: ['Не будуй біля спавну (100+ блоків).', 'Не руйнуй природу просто так.', 'Чужі тварини — недоторканні.', 'TNT та вогонь — обережно.'] },
                    { category: '💬 ЧАТ ТА ІНШЕ', list: ['Без спаму та реклами.', 'Мінімум нецензурщини.', 'Дотримуйся атмосфери РП.'] }
                ],
                donate: [
                    { name: 'Silver', price: '19 UAH', features: ['Префікс [Silver]', '+1 /sethome', '/hat', 'Пріоритет'] },
                    { name: 'Gold', price: '39 UAH', features: ['Все з Silver', 'Префікс [Gold]', '3 хоми', '/craft'] },
                    { name: 'Platinum', price: '79 UAH', features: ['Все з Gold', 'Префікс [Platinum]', '+3 хоми', '/enderchest'] },
                    { name: 'Diamond', price: '129 UAH', features: ['Все Platinum', 'Префікс [Diamond]', '+5 хомів', '/fly у регіоні'] },
                    { name: 'Emerald', price: '199 UAH', features: ['Все Diamond', 'Префікс [Emerald]', '/fly всюди', 'Бонус++'] },
                    { name: 'Obsidian', price: '299 UAH', features: ['Все Emerald', 'Префікс [Obsidian]', '/nick', '/anvil'] },
                    { name: 'Master', price: '399 UAH', features: ['МАКСИМУМ', 'Уся косметика', 'Унікальний ефект', 'Все з Obsidian'] }
                ]
            }
        };

        let currentIP = "";

        // Функція входу в режим
        function openMode(mode) {
            document.getElementById('selection').classList.remove('active');
            document.getElementById('main-ui').classList.add('active');
            document.getElementById('current-mode-title').innerText = mode;
            document.getElementById('mode-desc').innerText = data[mode].desc;
            
            currentIP = data[mode].ip;
            document.getElementById('ip-text').innerText = currentIP.toUpperCase();// Генерація правил
            const rc = document.getElementById('rules-container');
            rc.innerHTML = data[mode].rules.map(cat => `
                <div>
                    <h4 class="orbitron text-red-800 text-[10px] font-black mb-4 tracking-[0.3em] uppercase">${cat.category}</h4>
                    <div class="grid gap-2">
                        ${cat.list.map(r => <div class="glass-card p-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400 border-l-2 border-l-red-800">${r}</div>).join('')}
                    </div>
                </div>
            `).join('');

            // Генерація донату
            const dc = document.getElementById('donate-container');
            dc.innerHTML = data[mode].donate.map(d => `
                <div class="glass-card p-8 min-h-[350px]">
                    <div>
                        <h3 class="orbitron text-xl font-black mb-1 italic">${d.name}</h3>
                        <div class="text-red-800 font-black text-lg mb-6 tracking-tighter">${d.price}</div>
                        <ul class="text-[9px] text-zinc-500 tracking-tighter uppercase space-y-2 mb-8">
                            ${d.features.map(f => <li>• ${f}</li>).join('')}
                        </ul>
                    </div>
                    <a href="https://t.me/Nashik0" target="_blank" class="w-full border border-white/5 py-4 text-[9px] orbitron font-black hover:bg-red-800 hover:border-red-800 transition uppercase text-center block">Придбати</a>
                </div>
            `).join('');
            
            switchSub('home');
        }

        // Повернення на головну
        function goBack() {
            document.getElementById('main-ui').classList.remove('active');
            document.getElementById('selection').classList.add('active');
            currentIP = "";
            document.getElementById('ip-text').innerText = "CLICK TO COPY IP";
        }

        function switchSub(id) {
            document.querySelectorAll('.sub-content').forEach(s => s.classList.remove('active'));
            document.getElementById('sub-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function copyIP() {
            if(!currentIP) return;
            navigator.clipboard.writeText(currentIP);
            const el = document.getElementById('ip-text');
            const originalText = currentIP.toUpperCase();
            el.innerText = "COPIED!";
            el.style.color = "white";
            setTimeout(() => { 
                el.innerText = originalText; 
                el.style.color = "";
            }, 1500);
        }
    </script>
</body>
</html>
